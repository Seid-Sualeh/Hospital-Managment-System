    <!-- Primary Meta Tags -->

    <meta property="og:image" content="https://cms.et/favicon.svg" />
    
    <!-- Twitter -->

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <!-- Structured Data (JSON-LD) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",

        "address": {
          "@type": "PostalAddress",
          "streetAddress": "Bole Sub-City, Ward 03",
          "addressLocality": "Addis Ababa",
          "addressCountry": "ET"
        },
        "contactPoint": {
          "@type": "ContactPoint",
          "telephone": "+251911000000",
          "contactType": "customer service"
        }
      }
    </script>
  </head>

    <div id="root"></div>
