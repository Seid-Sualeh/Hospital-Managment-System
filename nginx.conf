user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Gzip Compression settings
    gzip on;
    gzip_disable "msie6";
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Upstream Backend Server node
    upstream backend_api {
        server backend:5000;
    }

    # 1. HTTP to HTTPS global redirect
    server {
        listen 80;
        server_name localhost *.cms.et;

        # Redirect all HTTP requests to HTTPS
        return 301 https://$host$request_uri;
    }

    # 2. HTTPS Tenant Routing and Reverse Proxy
    server {
        listen 443 ssl http2;
        server_name localhost *.cms.et;

        # SSL Certificates paths (managed by Certbot Let's Encrypt)
        ssl_certificate /etc/letsencrypt/live/cms.et/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/cms.et/privkey.pem;

        # TLS Protocols & Cipher Suit configs
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        # Production Security Headers
        add_header X-Frame-Options "DENY" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://checkout.chapa.co; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self' http://localhost:5000 https://checkout.chapa.co https://generativelanguage.googleapis.com; img-src 'self' data:; frame-src https://checkout.chapa.co;" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

        # Frontend assets root folder
        root /usr/share/nginx/html;
        index index.html;

        # SPA Routing Fallback (redirect all non-file hits to index.html for React Router)
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Cache control overrides for compiled assets
        location ~* \.(?:css|js|jpg|jpeg|gif|png|ico|cur|gz|svg|svgz|mp4|ogg|ogv|webm|htc)$ {
            expires 1y;
            access_log off;
            add_header Cache-Control "public, no-transform";
        }

        # Reverse Proxy to Node.js backend endpoints
        location /api/v1/ {
            proxy_pass http://backend_api;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }
    }
}
