version: '3.8'

services:
  # 1. MySQL Relational Database
  mysql_db:
    image: mysql:8.0
    container_name: cms_mysql_db
    restart: always
    environment:
      MYSQL_DATABASE: ethiopia_cms
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-RootSecurePass2026!}
      MYSQL_USER: cms_admin
      MYSQL_PASSWORD: ${DB_PASSWORD:-AdminSecurePass2026!}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/src/config/db_init.sql:/docker-entrypoint-initdb.d/1_init.sql
      - ./backend/src/config/db_seed.sql:/docker-entrypoint-initdb.d/2_seed.sql
    networks:
      - cms_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "cms_admin", "-p${DB_PASSWORD:-AdminSecurePass2026!}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 2. Node.js + Express Backend Server
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cms_backend
    restart: always
    environment:
      PORT: 5000
      NODE_ENV: production
      DB_HOST: mysql_db
      DB_USER: cms_admin
      DB_PASSWORD: ${DB_PASSWORD:-AdminSecurePass2026!}
      DB_NAME: ethiopia_cms
      JWT_SECRET: ${JWT_SECRET:-JwtProductionSecretSignKey2026!}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
    ports:
      - "5000:5000"
    depends_on:
      mysql_db:
        condition: service_healthy
    networks:
      - cms_network

  # 3. React + Vite Frontend (Docker static server built)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cms_frontend
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - backend
    networks:
      - cms_network

volumes:
  mysql_data:

networks:
  cms_network:
    driver: bridge
